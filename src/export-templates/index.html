<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmarklets</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Bookmarklets</h1>
      <p class="instructions">Drag any button to your bookmark bar to install it.</p>
    </header>

    {{#each groups}}
    <section class="group">
      <h2>{{name}}</h2>
      {{#each bookmarklets}}
      <div class="bookmarklet">
        <a class="bm-button" href="{{{url}}}">{{name}}</a>
        {{#if description}}
        <p class="bm-desc">{{description}}</p>
        {{/if}}
      </div>
      {{/each}}
    </section>
    {{/each}}
  </div>
  <script src="assets/script.js"></script>
</body>
</html>
